<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Photomatic</title>

    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/background.css" />
    <link rel="stylesheet" href="/static/css/slideshow.css" />
    <link rel="stylesheet" href="/static/css/datetime.css" />
    <link rel="stylesheet" href="/static/css/weather.css" />
  </head>

  <body>
    <div id="background1" class="background"></div>
    <div id="background2" class="background"></div>

    <img
      id="slideshow-main"
      src=""
      alt="slideshow main"
      class="slideshow-img show"
    />
    <img
      id="slideshow-next"
      src=""
      alt="slideshow next"
      class="slideshow-img"
      style="display: none"
    />

    <div id="datetime">
      <div id="weather">
        <div id="weather-icon"></div>
        <div id="weather-temp"></div>
      </div>
      <div id="time"></div>
      <div id="date"></div>
    </div>

    <script type="module">
      import { loadClientConfig } from '/static/js/config.js';
      import { initSlideshow } from '/static/js/slideshow.js';
      import { initDateTime } from '/static/js/datetime.js';
      import { initWeather } from '/static/js/weather.js';

      loadClientConfig().then((cfg) => {
        console.log('Loaded client config:', cfg);
        initSlideshow(cfg);
        initDateTime();
        initWeather(cfg);
      });
    </script>
  </body>
</html>
